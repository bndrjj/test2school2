<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>تقرير تحليل الاختبارات التشخيصية — قطاع الخبر 1446هـ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --p:#1e5f8a;--pl:#2d7db5;--pd:#154569;
  --acc:#e07b39;--ok:#27a062;--warn:#d68e1a;--err:#c0392b;
  --bg:#f0f4f8;--surf:#fff;--bdr:rgba(30,95,138,.12);
  --t:#1a2332;--t2:#4a5568;--t3:#718096;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--t);line-height:1.7;direction:rtl}
h1,h2,h3,h4{font-family:'Cairo',sans-serif;line-height:1.3}

/* ---- ACTION BAR ---- */
.action-bar{
  position:sticky;top:0;z-index:999;
  background:var(--pd);
  padding:.9rem 2rem;
  display:flex;align-items:center;gap:1rem;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.action-bar-title{font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;flex:1}
.btn-pdf{
  background:linear-gradient(135deg,var(--acc),#f09552);
  color:#fff;border:none;padding:.65rem 1.5rem;border-radius:999px;
  font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:.5rem;
  box-shadow:0 4px 14px rgba(224,123,57,.4);transition:all .2s;
}
.btn-pdf:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(224,123,57,.5)}
.btn-back{
  background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.4);
  padding:.65rem 1.3rem;border-radius:999px;
  font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.btn-back:hover{background:rgba(255,255,255,.25)}

/* ---- REPORT PAGES ---- */
.report{max-width:900px;margin:2rem auto;padding:0 1.5rem 4rem}
.page{background:var(--surf);border-radius:20px;box-shadow:0 8px 40px rgba(30,95,138,.1);margin-bottom:2.5rem;overflow:hidden}

/* ---- COVER PAGE ---- */
.cover{
  background:linear-gradient(135deg,var(--pd) 0%,var(--p) 55%,var(--pl) 100%);
  min-height:700px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 2rem;position:relative;overflow:hidden;
}
.cover::before{
  content:'';position:absolute;top:-40%;left:-15%;width:60%;height:180%;
  background:radial-gradient(ellipse,rgba(255,255,255,.07) 0%,transparent 70%);
  pointer-events:none;
}
.cover::after{
  content:'';position:absolute;bottom:-20%;right:-10%;width:50%;height:120%;
  background:radial-gradient(ellipse,rgba(255,255,255,.05) 0%,transparent 70%);
  pointer-events:none;
}
.cover-logo{height:90px;width:auto;filter:brightness(0) invert(1);margin-bottom:1.5rem;position:relative;z-index:1}
.cover-divider{width:60px;height:4px;background:rgba(255,255,255,.5);border-radius:2px;margin:1.2rem 0;position:relative;z-index:1}
.cover-title{font-size:2rem;font-weight:800;color:#fff;text-align:center;position:relative;z-index:1;line-height:1.4;max-width:600px}
.cover-subtitle{font-size:1.05rem;color:rgba(255,255,255,.85);margin-top:.6rem;text-align:center;position:relative;z-index:1}
.cover-school{font-size:1rem;color:rgba(255,255,255,.75);margin-top:.3rem;text-align:center;position:relative;z-index:1}
.cover-badges{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;margin-top:1.2rem;position:relative;z-index:1}
.cbadge{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:.35rem 1rem;border-radius:999px;font-size:.85rem;font-weight:600;
  backdrop-filter:blur(6px);
}
.cover-stats{
  display:flex;gap:2rem;margin-top:2rem;position:relative;z-index:1;flex-wrap:wrap;justify-content:center;
}
.cstat{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  padding:1rem 1.5rem;border-radius:16px;text-align:center;min-width:140px;
  backdrop-filter:blur(8px);
}
.cstat-val{font-family:'Cairo',sans-serif;font-size:2.2rem;font-weight:800;color:#fff;line-height:1}
.cstat-lbl{font-size:.82rem;color:rgba(255,255,255,.8);margin-top:.3rem}
.cover-date{margin-top:1.5rem;color:rgba(255,255,255,.65);font-size:.85rem;position:relative;z-index:1}

/* ---- SECTION HEADERS ---- */
.sec-hdr{
  background:linear-gradient(135deg,var(--pd),var(--p));
  padding:1.5rem 2rem;display:flex;align-items:center;gap:1rem;
}
.sec-hdr-icon{font-size:1.6rem}
.sec-hdr-text h2{font-size:1.3rem;font-weight:800;color:#fff}
.sec-hdr-text p{font-size:.9rem;color:rgba(255,255,255,.8);margin-top:.15rem}
.sec-body{padding:2rem}

/* ---- GRADE CARDS (SUMMARY) ---- */
.grade-cards{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.gcard{border:1.5px solid var(--bdr);border-radius:16px;overflow:hidden}
.gcard-hdr{
  padding:1rem 1.5rem;display:flex;align-items:center;gap:.8rem;
}
.gcard-hdr.g6{background:linear-gradient(135deg,#e3f0fa,#c8e0f5)}
.gcard-hdr.g9{background:linear-gradient(135deg,#f0ebfa,#ddd4f5)}
.gcard-hdr h3{font-size:1rem;font-weight:800;color:var(--pd)}
.gcard-body{padding:1.25rem 1.5rem}

.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(30,95,138,.07)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:.88rem;color:var(--t2);font-weight:500}
.stat-val{font-family:'Cairo',sans-serif;font-weight:800;color:var(--p);font-size:.95rem}

.diff-pills{display:flex;gap:.5rem;margin-top:.9rem}
.pill{padding:.25rem .75rem;border-radius:999px;font-size:.78rem;font-weight:700;font-family:'Cairo',sans-serif}
.pill.easy{background:#e8f7f0;color:var(--ok)}
.pill.med{background:#fef6e4;color:var(--warn)}
.pill.hard{background:#fde8e6;color:var(--err)}

.subj-bars{margin-top:.9rem;display:grid;gap:.5rem}
.subj-bar-row{display:flex;align-items:center;gap:.75rem}
.subj-bar-lbl{font-size:.8rem;color:var(--t2);width:90px;flex-shrink:0;font-weight:600}
.subj-bar-track{flex:1;height:8px;background:rgba(30,95,138,.1);border-radius:4px;overflow:hidden}
.subj-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.subj-bar-pct{font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:800;width:42px;text-align:left;color:var(--p)}

/* ---- TABLE ---- */
.tbl-wrap{overflow-x:auto;margin-top:1rem}
table{width:100%;border-collapse:collapse;font-size:.88rem}
thead th{
  background:var(--pd);color:#fff;
  padding:.75rem .9rem;text-align:right;font-family:'Cairo',sans-serif;font-weight:700;
  font-size:.84rem;white-space:nowrap;
}
tbody td{padding:.65rem .9rem;border-bottom:1px solid rgba(30,95,138,.07);vertical-align:middle}
tbody tr:hover td{background:#f7fafd}
tbody tr.easy-row td{background:#f0fbf5}
tbody tr.hard-row td{background:#fff5f5}
.num-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:7px;background:var(--p);
  color:#fff;font-size:.78rem;font-weight:800;font-family:'Cairo',sans-serif;
}
.subj-tag{padding:.2rem .6rem;border-radius:999px;font-size:.75rem;font-weight:700}
.subj-tag.arabic{background:#e3f0fa;color:var(--p)}
.subj-tag.unnamed{background:#f5f0fa;color:#6c4dbf}
.subj-tag.science{background:#e8f7f0;color:var(--ok)}
.diff-tag{padding:.2rem .6rem;border-radius:999px;font-size:.75rem;font-weight:700}
.diff-tag.easy{background:#e8f7f0;color:var(--ok)}
.diff-tag.med{background:#fef6e4;color:var(--warn)}
.diff-tag.hard{background:#fde8e6;color:var(--err)}
.bar-cell{display:flex;align-items:center;gap:.6rem}
.mini-bar{width:70px;height:8px;background:rgba(30,95,138,.1);border-radius:4px;overflow:hidden;flex-shrink:0}
.mini-bar-fill{height:100%;border-radius:4px}
.pct-txt{font-family:'Cairo',sans-serif;font-weight:800;font-size:.88rem}

/* ---- CRITICAL QUESTIONS ---- */
.crit-section{margin-bottom:2rem}
.crit-title{
  font-size:1rem;font-weight:800;color:var(--pd);margin-bottom:1rem;
  padding-bottom:.5rem;border-bottom:2px solid var(--bdr);
  display:flex;align-items:center;gap:.6rem;
}
.crit-title::before{content:'';width:4px;height:18px;background:var(--err);border-radius:2px;display:inline-block}
.q-card{border:1.5px solid var(--bdr);border-radius:12px;margin-bottom:1rem;overflow:hidden}
.q-card-hdr{
  background:#fff5f5;padding:1rem 1.25rem;
  display:flex;align-items:flex-start;gap:.75rem;
  border-bottom:1px solid rgba(192,57,43,.15);
}
.q-num{
  width:32px;height:32px;border-radius:8px;background:var(--err);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cairo',sans-serif;font-weight:800;font-size:.88rem;flex-shrink:0;
}
.q-text{font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;color:var(--t);flex:1;line-height:1.5}
.q-diff-bar-wrap{display:flex;align-items:center;gap:.7rem;padding:.75rem 1.25rem;background:#fafafa;border-bottom:1px solid var(--bdr)}
.q-diff-label{font-size:.82rem;font-weight:700;color:var(--t2);white-space:nowrap}
.q-diff-track{flex:1;height:9px;background:rgba(30,95,138,.08);border-radius:5px;overflow:hidden}
.q-diff-fill{height:100%;border-radius:5px}
.q-diff-pct{font-family:'Cairo',sans-serif;font-weight:800;font-size:.95rem}
.opts{padding:.75rem 1.25rem;display:grid;gap:.5rem}
.opt{
  padding:.6rem .9rem;border-radius:8px;border:1.5px solid var(--bdr);
  background:#f7fafd;
}
.opt.correct{border-color:rgba(39,160,98,.35);background:#f0fbf5}
.opt-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem}
.opt-icon{
  width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;flex-shrink:0;
}
.opt-icon.ok{background:var(--ok);color:#fff}
.opt-icon.no{background:rgba(30,95,138,.12);color:var(--t3)}
.opt-ans{flex:1;font-size:.84rem;font-weight:600;color:var(--t)}
.opt-ans.ok{color:var(--ok)}
.opt-stats{font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:800}
.opt-stats.ok{color:var(--ok)}
.opt-bar-wrap{width:100%;height:6px;background:rgba(30,95,138,.08);border-radius:3px;overflow:hidden}
.opt-bar{height:100%;border-radius:3px}
.bar-ok{background:linear-gradient(90deg,#27a062,#33c47a)}
.bar-no{background:linear-gradient(90deg,rgba(30,95,138,.3),rgba(30,95,138,.5))}

/* ---- FOOTER ---- */
.report-footer{
  background:var(--pd);padding:1.5rem 2rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.report-footer p{color:rgba(255,255,255,.75);font-size:.82rem}

/* ---- PRINT ---- */
@media print{
  @page{size:A4;margin:12mm 15mm}
  body{background:#fff}
  .action-bar{display:none!important}
  .report{max-width:100%;margin:0;padding:0}
  .page{box-shadow:none;border-radius:0;margin-bottom:0;page-break-after:always}
  .page:last-child{page-break-after:auto}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .cover{min-height:100vh}
  .bar-cell .mini-bar,.subj-bar-track,.q-diff-track,.opt-bar-wrap{background:#e8eef4!important}
  tbody tr.easy-row td{background:#f0fbf5!important}
  tbody tr.hard-row td{background:#fff5f5!important}
}

@media(max-width:700px){
  .grade-cards{grid-template-columns:1fr}
  .cover-stats{gap:1rem}
  .cstat{min-width:120px}
}
</style>
</head>

function subjAvg(qs, subj){
  const f = qs.filter(q=>q.subject===subj);

}

    return `
    <div class="gcard">
      <div class="gcard-hdr ${g.cls}">
        <span style="font-size:1.4rem">${g.emoji}</span>
        <h3>${g.label}</h3>
      </div>
      <div class="gcard-body">
        <div class="stat-row"><span class="stat-lbl">إجمالي الطلاب</span><span class="stat-val">${d.total_students} طالب</span></div>
        <div class="stat-row"><span class="stat-lbl">متوسط الدرجة</span><span class="stat-val">${d.avg_score} / 30</span></div>
        <div class="stat-row"><span class="stat-lbl">متوسط الإجابة الصحيحة</span><span class="stat-val">${avg}%</span></div>
        <div class="stat-row"><span class="stat-lbl">المدرسة</span><span class="stat-val">${d.schools[0]}</span></div>
        <div class="diff-pills">
          <span class="pill easy">✅ سهل: ${easy}</span>
          <span class="pill med">⚡ متوسط: ${med}</span>
          <span class="pill hard">⚠ صعب: ${hard}</span>
        </div>
        <div class="subj-bars">
          <div class="subj-bar-row">
            <span class="subj-bar-lbl">اللغة العربية</span>
            <div class="subj-bar-track"><div class="subj-bar-fill" style="width:${arAvg}%;background:#1e5f8a"></div></div>
            <span class="subj-bar-pct">${arAvg}%</span>
          </div>
          <div class="subj-bar-row">
            <span class="subj-bar-lbl">الرياضيات</span>
            <div class="subj-bar-track"><div class="subj-bar-fill" style="width:${mathAvg}%;background:#6c4dbf"></div></div>
            <span class="subj-bar-pct">${mathAvg}%</span>
          </div>
          <div class="subj-bar-row">
            <span class="subj-bar-lbl">العلوم</span>
            <div class="subj-bar-track"><div class="subj-bar-fill" style="width:${sciAvg}%;background:#27a062"></div></div>
            <span class="subj-bar-pct">${sciAvg}%</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="page">
    <div class="sec-hdr">
      <span class="sec-hdr-icon">📊</span>
      <div class="sec-hdr-text">
        <h2>الملخص التنفيذي</h2>
        <p>نظرة عامة على أداء الطلاب في الاختبارات التشخيصية</p>
      </div>
    </div>
    <div class="sec-body">
      <div class="grade-cards">${cards}</div>
    </div>
    <div class="report-footer">
      <p>وزارة التعليم — إدارة التعليم بالشرقية — قطاع الخبر</p>
      <p>الفصل الدراسي الثالث 1446هـ</p>
    </div>
  </div>`;
}

function renderGradeTable(gKey){
  const d = ALL_DATA[gKey];
  const qs = d.questions;
  const sorted = [...qs].sort((a,b)=>b.difficulty-a.difficulty);
  const topIdxs = new Set(sorted.slice(0,3).map(q=>q.index));
  const botIdxs = new Set(sorted.slice(-3).map(q=>q.index));

  const rows = qs.map(q=>{
    const lv = diffLevel(q.difficulty);
    const rowCls = topIdxs.has(q.index) ? 'easy-row' : botIdxs.has(q.index) ? 'hard-row' : '';
    const qShort = q.is_named ? (q.question.length>65 ? q.question.substring(0,65)+'…' : q.question) : '📐 سؤال رياضيات #'+q.index;
    return `<tr class="${rowCls}">
      <td><span class="num-badge">${q.index}</span></td>
      <td style="max-width:280px">${qShort}</td>
      <td><span class="subj-tag ${SUBJ_CLS[q.subject]}">${SUBJ_MAP[q.subject]}</span></td>
      <td style="font-family:Cairo;font-weight:700">${q.total}</td>
      <td>
        <div class="bar-cell">
          <div class="mini-bar"><div class="mini-bar-fill" style="width:${q.difficulty}%;background:${lv.color}"></div></div>
          <span class="pct-txt" style="color:${lv.color}">${q.difficulty}%</span>
        </div>
      </td>
      <td><span class="diff-tag ${lv.cls}">${lv.label}</span></td>
    </tr>`;
  }).join('');

  const gradeLabel = gKey==='grade6' ? 'الصف السادس الابتدائي' : 'الصف الثالث المتوسط';
  const emoji = gKey==='grade6' ? '📚' : '📘';

  return `
  <div class="page">
    <div class="sec-hdr">
      <span class="sec-hdr-icon">${emoji}</span>
      <div class="sec-hdr-text">
        <h2>تحليل بنود الأسئلة — ${gradeLabel}</h2>
        <p>${d.schools[0]} | ${d.sectors[0]} | ${d.total_students} طالب | متوسط الدرجة: ${d.avg_score}/30</p>
      </div>
    </div>
    <div class="sec-body">
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;font-size:.82rem;color:#718096">
        <span style="background:#f0fbf5;padding:.2rem .7rem;border-radius:6px;font-weight:700;color:#27a062">✅ الأعلى أداءً (أفضل 3)</span>
        <span style="background:#fff5f5;padding:.2rem .7rem;border-radius:6px;font-weight:700;color:#c0392b">⚠ الأصعب (أدنى 3)</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>#</th><th>السؤال</th><th>المادة</th><th>المجيبون</th><th>نسبة الصواب</th><th>المستوى</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div class="report-footer">
      <p>${gradeLabel} — ${d.schools[0]} — قطاع الخبر</p>
      <p>جميع الأرقام مستخرجة من بيانات الاختبار الفعلية</p>
    </div>
  </div>`;
}

function renderCritical(gKey){
  const d = ALL_DATA[gKey];
  const hardQs = [...d.questions].filter(q=>q.difficulty<45).sort((a,b)=>a.difficulty-b.difficulty);
  if(!hardQs.length) return '';

  const gradeLabel = gKey==='grade6' ? 'الصف السادس الابتدائي' : 'الصف الثالث المتوسط';
  const emoji = gKey==='grade6' ? '📚' : '📘';

  const qCards = hardQs.map(q=>{
    const lv = diffLevel(q.difficulty);
    const opts = q.options.map(opt=>`
      <div class="opt ${opt.is_correct?'correct':''}">
        <div class="opt-row">
          <div class="opt-icon ${opt.is_correct?'ok':'no'}">${opt.is_correct?'✓':'✗'}</div>
          <div class="opt-ans ${opt.is_correct?'ok':''}">${opt.answer}</div>
          <div class="opt-stats ${opt.is_correct?'ok':''}">${opt.percentage}% (${opt.count})</div>
        </div>
        <div class="opt-bar-wrap"><div class="opt-bar ${opt.is_correct?'bar-ok':'bar-no'}" style="width:${opt.percentage}%"></div></div>
      </div>`).join('');

    return `
    <div class="q-card">
      <div class="q-card-hdr">
        <div class="q-num">${q.index}</div>
        <div class="q-text">${q.is_named?q.question:'📐 سؤال رياضيات #'+q.index}</div>
      </div>
      <div class="q-diff-bar-wrap">
        <span class="q-diff-label">نسبة الإجابة الصحيحة:</span>
        <div class="q-diff-track"><div class="q-diff-fill" style="width:${q.difficulty}%;background:${lv.color}"></div></div>
        <span class="q-diff-pct" style="color:${lv.color}">${q.difficulty}%</span>
        <span class="diff-tag ${lv.cls}" style="margin-right:.5rem">${lv.label}</span>
      </div>
      <div class="opts">${opts}</div>
    </div>`;
  }).join('');

  return `
  <div class="page">
    <div class="sec-hdr">
      <span class="sec-hdr-icon">⚠️</span>
      <div class="sec-hdr-text">
        <h2>الأسئلة الحرجة — ${gradeLabel}</h2>
        <p>الأسئلة ذات الصعوبة العالية (نسبة إجابة صحيحة أقل من 45%)</p>
      </div>
    </div>
    <div class="sec-body">
      <div class="crit-section">
        <div class="crit-title">تحليل تفصيلي للأسئلة الصعبة — ${gradeLabel}</div>
        ${qCards}
      </div>
    </div>
    <div class="report-footer">
      <p>يُنصح بمراجعة هذه الأسئلة وتعزيز تدريس المفاهيم المرتبطة بها</p>
      <p>${gradeLabel} — قطاع الخبر — 1446هـ</p>
    </div>
  </div>`;
}

function render(){
  const el = document.getElementById('report');
  el.innerHTML =
    renderCover() +
    renderSummary() +
    renderGradeTable('grade6') +
    renderCritical('grade6') +
    renderGradeTable('grade9') +
    renderCritical('grade9');
}

render();
</script>
</body>
</html>
